<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{project}} Software Quality Report</title>
    <style>
      :root { color-scheme: dark; --bg:#07111f; --panel:#0d1b2e; --panel2:#10243d; --text:#e5edf7; --muted:#94a3b8; --ok:#22c55e; --bad:#ef4444; --warn:#f59e0b; --line:#1e3a5f; }
      body { margin:0; background:linear-gradient(180deg,#050b15,#081827); color:var(--text); font-family:Inter,Segoe UI,Arial,sans-serif; }
      main { max-width:1180px; margin:0 auto; padding:32px 20px 56px; }
      header { display:flex; justify-content:space-between; gap:24px; align-items:flex-start; border-bottom:1px solid var(--line); padding-bottom:24px; }
      h1 { margin:0; font-size:30px; letter-spacing:0; }
      h2 { margin:32px 0 14px; font-size:18px; }
      p { color:var(--muted); }
      .score { font-size:42px; font-weight:800; }
      .grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; margin-top:24px; }
      .card { background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid var(--line); border-radius:8px; padding:18px; box-shadow:0 20px 40px rgba(0,0,0,.22); }
      .metric { font-size:28px; font-weight:800; margin-top:6px; }
      .label { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.08em; }
      table { width:100%; border-collapse:collapse; overflow:hidden; border-radius:8px; border:1px solid var(--line); }
      th,td { padding:12px; border-bottom:1px solid var(--line); text-align:left; font-size:14px; }
      th { background:#0b1a2c; color:#cbd5e1; }
      tr:last-child td { border-bottom:0; }
      .badge { display:inline-block; border-radius:999px; padding:4px 9px; font-size:12px; font-weight:800; }
      .PASS { background:rgba(34,197,94,.15); color:#86efac; }
      .FAIL { background:rgba(239,68,68,.15); color:#fca5a5; }
      .WARNING { background:rgba(245,158,11,.15); color:#fcd34d; }
      .bar { height:8px; background:#172a45; border-radius:999px; overflow:hidden; }
      .bar span { display:block; height:100%; background:linear-gradient(90deg,#22c55e,#06b6d4); }
      @media (max-width:850px){ .grid{ grid-template-columns:repeat(2,minmax(0,1fr)); } header{ display:block; } }
    </style>
  </head>
  <body>
    <main>
      {{content}}
    </main>
  </body>
</html>
